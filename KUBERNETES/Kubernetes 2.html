<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kubernetes Authentication Resources</title>
    <style>
        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
        }

        h1 {
            color: #326ce5;
            border-bottom: 3px solid #326ce5;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        h2 {
            color: #326ce5;
            margin-top: 30px;
            margin-bottom: 15px;
        }

        ul {
            list-style: none;
            padding-left: 0;
        }

        li {
            margin: 12px 0;
            padding: 10px;
            background-color: #f8f9fa;
            border-left: 4px solid #326ce5;
            transition: all 0.3s ease;
        }

        li:hover {
            background-color: #e3f2fd;
            transform: translateX(5px);
        }

        .resource-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-icon {
            font-weight: bold;
            color: #326ce5;
            min-width: 20px;
        }

        .resource-name {
            font-weight: 500;
            color: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Kubernetes Authentication Resources</h1>

        <p>Authentication resources manage identity, access control, and security tokens for applications and services in Kubernetes.</p>

        <h2>Available Resources</h2>
        <ul>
            <li>
                <div class="resource-item">
                    <span class="toggle-icon">⊟</span>
                    <span class="resource-name">ServiceAccount</span>
                </div>
            </li>
            <li>
                <div class="resource-item">
                    <span class="toggle-icon">⊞</span>
                    <span class="resource-name">Secret</span>
                </div>
            </li>
            <li>
                <div class="resource-item">
                    <span class="toggle-icon">⊞</span>
                    <span class="resource-name">TokenRequest</span>
                </div>
            </li>
            <li>
                <div class="resource-item">
                    <span class="toggle-icon">⊞</span>
                    <span class="resource-name">TokenReview</span>
                </div>
            </li>
        </ul>
    </div>
</body>
</html>
